<!DOCTYPE html>
<html style="height:100%">
<head>
    <title>Overcooked Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let popup = null;

            document.querySelector('#join').addEventListener('click', function() {
                const gameCode = document.querySelector('input[name="join_game"]').value;
                if (gameCode) {
                    window.location.href = "{{ url_for('game_index', game_id='') }}" + gameCode;
                }
            });

            document.querySelector('input[name="join_game"]').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    document.querySelector('#join').click();
                }
            });
        });
    </script>
</head>
<body>    
    <div class="main">
        <div class="action-buttons">
            <button class="cool-button" id="how-to-play" aria-label="How to Play">
                How to Play
            <button id="theme-toggle" class="cool-button" aria-label="Toggle Theme">
                <span id="icon-container">
                    <div id="sun" style="display: none;"> <!-- Initially hidden -->
                        <!-- Sun Icon SVG -->
                        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5" fill="#FFD700" />
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M17.36 17.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M17.36 6.64l1.42-1.42" stroke="#FFA500" stroke-width="2" />
                        </svg>
                    </div>
                    <div id="moon">
                        <!-- Cool Moon Icon SVG -->
                        <?xml version="1.0" ?><!DOCTYPE svg  PUBLIC '-//W3C//DTD SVG 1.1//EN'  'http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd'><svg height="24px" version="1.1" viewBox="0 0 512 512" width="24px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><path d="M248.082,263.932c-31.52-31.542-39.979-77.104-26.02-116.542c-15.25,5.395-29.668,13.833-41.854,26.02  c-43.751,43.75-43.751,114.667,0,158.395c43.729,43.73,114.625,43.752,158.374,0c12.229-12.186,20.646-26.604,26.021-41.854  C325.188,303.91,279.604,295.451,248.082,263.932z" fill="#FFD700"/></svg>
                    </div>            
                </span>
            </button>
        </div>
            <div class="logo-container">
                <img class="logo" src="{{ url_for('static', filename='logo.png') }}">
            </div>
            <div class="footer">
                <div class="game public">
                    <div class="game-title public-game-title">Public</div>
                    <div class="subtitle">
                        play with random people!
                    </div>
                    <form action="{{ url_for('join_random') }}" method="post">
                        <button type="submit" class="cool-button">Join Random Game</button>
                    </form>
                </div>
                <div class="game private">
                    <div class="game-title private-game-title">Private</div>
                    <div class="subtitle">
                        play with your friends!
                    </div>
                    <div class="join-game">
                        <!-- <label class="join-label">Join game:</label> -->
                        <input type="text" name="join_game" class="join-input" placeholder="Enter room code">
                        <button class="cool-button" id="join">Join</button>
                    </div>
                    <div>or</div>
                    <div>
                        <form action="{{ url_for('create_game') }}" method="post">
                            <button type="submit" class="cool-button">Create New Game</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    <script src="{{ url_for('static', filename='js/toggle.js') }}"></script> <!-- Include the JavaScript file -->
</body>
</html>
