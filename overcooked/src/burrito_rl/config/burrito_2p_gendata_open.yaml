        type: Box
        low: -65535
        high: 65535
        shape:
          - 7
          - 10
          - 12
        dtype: int32
      action_mask:
        type: Box
        low: 0
        high: 1
        shape:
          - 27
        dtype: float32
      action_stats:
        type: Box
        low: 0
        high: 1
        shape:
          - 27
        dtype: float32
      order_list:
        type: Box
        low: 0
        high: 1
        shape:
          - 8
        dtype: int8
  action_space:
    type: Discrete
    n: 27
  rew_shaping_params:
    place_tortilla_on_plate:
      - 0
      - 0
    pickup_dish_from_sink:
      - 0
      - 0
    pickup_chopped_ingredient_from_chopboard:
      - 0
      - 0
    place_ingredient_on_grill:
      - 0
      - 0
    pickup_cooked_ingredient_from_grill:
      - 0
      - 0
    place_ingredient_on_pot:
      - 3
      - 3
    pickup_cooked_ingredient_from_pot:
      - 5
      - 5
    pickup_mushroom:
      - 0
      - 0
    pickup_meat:
      - 0
      - 0
    pickup_rice:
      - 0
      - 0
    extinguish_fire:
      - 1
      - 1
    place_charcoal_on_trash:
      - 1
      - 1
    burn_ingredient: -0.01
    wash_dish:
      - 3
      - 3
    food_assembly:
      - 5
      - 5
    serve_dish:
      - 10
      - 10
    wrong_dish_discount: 1
    correct_dish_bonus: 1
    random_dish_delivery: 0
    multiplier_params:
      - - 1
        - 1
      - - 4
        - 2
      - - 100
        - 5
BASE_CONFIG:
  env: burrito
  count_steps_by: env_steps
  alg: PPO
  sgd_minibatch_size: 512
  num_sgd_iter: 4
  train_batch_size: 8192
  lr_schedule:
    - - 0
      - 0.001
    - - 1000000
      - 0.001
    - - 2500000
      - 0.0001
  lambda: 0.999
  kl_coeff: 0.5
  clip_rewards: false
  clip_param: 0.2
  vf_clip_param: 10
  vf_loss_coeff: 0.5
  entropy_coeff: 0.01
  gamma: 0.999
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  num_workers: 4
  num_envs_per_worker: 4
  num_cpus_per_worker: 1
  num_cpus_for_driver: 1
  num_gpus: 3
  num_gpus_per_worker: 0
  framework: torch
  use_gae: true
  pretrained_model_path:
    - /data/shuyang/overcooked/src/burrito_rl/policy_params/open_bp_population3/pol10/policy_state.pkl
    - /data/shuyang/overcooked/src/burrito_rl/policy_params/open_bp_population3/polBR10/policy_state.pkl
