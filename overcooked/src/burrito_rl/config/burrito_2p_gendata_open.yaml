ACTION_SPACE_VALUE: 27
OBS_SPACE_CHANNEL: 12
N_AGENTS: 2
ACTOR_EMBEDDING_DIM: 200
CRITIC_EMBEDDING_DIM: 200
MODEL_CONFIG:
  custom_model: IPPO_model
  custom_model_config:
    model_type: custom_conv
    input_conv_channels: 12
    actor_output_size: 27
    critic_share_layers: false
    conv_filters:
      - - 16
        - 3
        - 1
        - same
        - default
      - - pool
        - 2
        - 2
        - valid
        - null
      - - 32
        - 2
        - 1
        - valid
        - default
      - - 64
        - 2
        - 1
        - valid
        - default
    actor_layer_sizes:
      - - 200
        - 64
      - - 64
        - 27
    critic_layer_sizes:
      - - 200
        - 64
      - - 64
        - 1
