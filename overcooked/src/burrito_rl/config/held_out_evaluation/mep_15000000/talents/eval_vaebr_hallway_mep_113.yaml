  pretrained_model_path_eval: /home/gpu01/tianxiaojia/Workplace2/talents-zsc/overcooked/src/burrito_rl/policy_params/hallway_pp_mep_15000000/0000/checkpoint_000000/pol113/policy_state.pkl
  # Model paths
